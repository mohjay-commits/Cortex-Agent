<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cortex">
<meta name="theme-color" content="#07090e">
<meta name="description" content="Cortex — Your Private AI Agent">
<title>Cortex</title>

<!-- PWA Manifest inline -->
<script>
const manifestData = {
  name: "Cortex AI",
  short_name: "Cortex",
  description: "Your private real-time AI agent",
  start_url: "./",
  display: "standalone",
  background_color: "#07090e",
  theme_color: "#07090e",
  orientation: "portrait",
  icons: [
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='40' fill='%23e8ff47'/><text x='96' y='130' text-anchor='middle' font-family='Arial' font-weight='900' font-size='80' fill='%2307090e'>CX</text></svg>", sizes: "192x192", type: "image/svg+xml" },
    { src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'><rect width='512' height='512' rx='100' fill='%23e8ff47'/><text x='256' y='340' text-anchor='middle' font-family='Arial' font-weight='900' font-size='220' fill='%2307090e'>CX</text></svg>", sizes: "512x512", type: "image/svg+xml" }
  ]
};
const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/json'});
const manifestURL = URL.createObjectURL(blob);
const link = document.createElement('link');
link.rel = 'manifest'; link.href = manifestURL;
document.head.appendChild(link);
</script>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Fira+Code:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #07090e;
    --s1: #0c0f17;
    --s2: #111620;
    --s3: #161c28;
    --border: #1d2535;
    --border2: #252f42;
    --a1: #e8ff47;
    --a2: #00cfff;
    --a3: #ff6b35;
    --green: #00ff9d;
    --purple: #b47fff;
    --text: #eef1f8;
    --text2: #8a95aa;
    --text3: #4a5568;
    --r: 18px;
  }
  html { height: 100%; }
  body {
    height: 100dvh; background: var(--bg);
    color: var(--text); font-family: 'Outfit', sans-serif;
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  .glow {
    position: fixed; pointer-events: none; z-index: 0;
    border-radius: 50%; filter: blur(80px); opacity: 0.06;
  }
  .glow-1 { top: -100px; left: -100px; width: 400px; height: 400px; background: var(--a1); }
  .glow-2 { bottom: -100px; right: -100px; width: 350px; height: 350px; background: var(--a2); }

  #app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100dvh; max-width: 520px; margin: 0 auto;
  }

  /* ═══ HEADER ═══ */
  header {
    flex-shrink: 0; padding: 12px 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
    background: rgba(7,9,14,0.92);
    backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-mark svg { width: 32px; height: 32px; }
  .logo-name { font-weight: 800; font-size: 19px; letter-spacing: -0.3px; }
  .logo-name .cx { color: var(--a1); }
  .logo-name .ver { font-size: 10px; opacity: 0.35; font-weight: 400; margin-left: 2px; }
  .header-right { display: flex; align-items: center; gap: 6px; }
  .model-badge {
    background: rgba(0,207,255,0.07); border: 1px solid rgba(0,207,255,0.18);
    border-radius: 20px; padding: 4px 9px;
    font-size: 10px; font-weight: 600; color: var(--a2);
    font-family: 'Fira Code', monospace; cursor: pointer;
  }
  .status-pill {
    display: flex; align-items: center; gap: 5px;
    background: rgba(232,255,71,0.07); border: 1px solid rgba(232,255,71,0.15);
    border-radius: 20px; padding: 4px 9px;
    font-size: 10px; font-weight: 600; color: var(--a1);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--a1); box-shadow: 0 0 6px var(--a1);
    animation: breathe 2.5s ease-in-out infinite;
  }
  @keyframes breathe { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 9px;
    background: var(--s2); border: 1px solid var(--border);
    color: var(--text2); display: flex; align-items: center;
    justify-content: center; cursor: pointer; font-size: 13px;
    -webkit-tap-highlight-color: transparent; transition: all .15s;
  }
  .icon-btn:active { transform: scale(.88); }

  /* ═══ MESSAGES ═══ */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 14px 13px 8px;
    display: flex; flex-direction: column; gap: 14px;
    overscroll-behavior: contain;
  }
  #messages::-webkit-scrollbar { width: 0; }

  .msg {
    display: flex; flex-direction: column; gap: 5px;
    animation: msgIn .26s cubic-bezier(.34,1.4,.64,1);
  }
  @keyframes msgIn { from{opacity:0;transform:translateY(12px) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  .msg.user { align-items: flex-end; }
  .msg.ai { align-items: flex-start; }
  .msg-meta { display: flex; align-items: center; gap: 6px; padding: 0 4px; }
  .msg-avatar {
    width: 20px; height: 20px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 800;
  }
  .msg.ai .msg-avatar { background: linear-gradient(135deg,rgba(232,255,71,.2),rgba(0,207,255,.2)); color: var(--a1); }
  .msg.user .msg-avatar { background: rgba(255,107,53,.15); color: var(--a3); }
  .msg-name { font-size: 11px; font-weight: 600; letter-spacing: .3px; }
  .msg.ai .msg-name { color: var(--a1); opacity: .8; }
  .msg.user .msg-name { color: var(--a3); opacity: .8; }
  .msg-time { font-size: 10px; color: var(--text3); font-family:'Fira Code',monospace; margin-left: auto; }
  .bubble {
    max-width: 92%; padding: 12px 15px;
    font-size: 14px; line-height: 1.65;
    word-break: break-word; position: relative;
  }
  .msg.user .bubble {
    background: #0f1922; border: 1px solid rgba(255,107,53,.12);
    border-radius: var(--r) var(--r) 4px var(--r); color: var(--text);
  }
  .msg.ai .bubble {
    background: #0a1410; border: 1px solid rgba(232,255,71,.08);
    border-radius: var(--r) var(--r) var(--r) 4px; color: rgba(238,241,248,.92);
  }
  .bubble.speaking::after {
    content:''; position:absolute; bottom:-1px; left:16px; right:16px;
    height:2px; background:linear-gradient(90deg,var(--a1),var(--a2));
    border-radius:2px; animation:speakBar 2s linear infinite;
  }
  @keyframes speakBar { 0%{transform:scaleX(0);transform-origin:left} 100%{transform:scaleX(1);transform-origin:left} }

  /* TOOL CARD */
  .tool-card {
    background: rgba(0,207,255,0.05); border: 1px solid rgba(0,207,255,0.15);
    border-radius: 12px; padding: 9px 13px;
    font-size: 12px; color: var(--a2);
    display: flex; align-items: center; gap: 8px;
    font-family: 'Fira Code', monospace;
    animation: msgIn .2s ease; max-width: 92%;
  }
  .tool-card.done { border-color: rgba(0,255,157,0.2); color: var(--green); background: rgba(0,255,157,0.04); }
  .tool-card.error { border-color: rgba(255,107,53,0.2); color: var(--a3); background: rgba(255,107,53,0.04); }
  .spin { animation: spin .8s linear infinite; display: inline-block; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* THINKING */
  .thinking-bubble {
    background: #0a1410; border: 1px solid rgba(232,255,71,.08);
    border-radius: var(--r) var(--r) var(--r) 4px;
    padding: 14px 18px; display: flex; align-items: center; gap: 5px;
  }
  .dot { width:6px;height:6px;border-radius:50%;animation:dotP 1.4s ease-in-out infinite;opacity:.3; }
  .dot:nth-child(1){background:var(--a1)}
  .dot:nth-child(2){background:var(--a2);animation-delay:.2s}
  .dot:nth-child(3){background:var(--a3);animation-delay:.4s}
  @keyframes dotP{0%,80%,100%{transform:scale(.7);opacity:.3}40%{transform:scale(1.2);opacity:1}}

  /* WELCOME */
  #welcome {
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;text-align:center;
    padding:16px 20px;gap:11px;flex:1;min-height:260px;
  }
  .welcome-ring { position:relative;width:72px;height:72px;margin-bottom:4px; }
  .welcome-ring svg { width:72px;height:72px;animation:spin 14s linear infinite; }
  .center-icon { position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px; }
  #welcome h2 { font-weight:800;font-size:23px;letter-spacing:-.5px; }
  #welcome h2 span { color:var(--a1); }
  #welcome p { font-size:13px;color:var(--text2);max-width:250px;line-height:1.6; }
  .live-badges { display:flex;flex-wrap:wrap;gap:6px;justify-content:center; }
  .lb {
    display:flex;align-items:center;gap:5px;
    border-radius:20px;padding:5px 11px;
    font-size:11px;font-weight:600;
  }
  .lb-s { background:rgba(232,255,71,.07);border:1px solid rgba(232,255,71,.15);color:var(--a1); }
  .lb-c { background:rgba(0,255,157,.07);border:1px solid rgba(0,255,157,.15);color:var(--green); }
  .lb-n { background:rgba(0,207,255,.07);border:1px solid rgba(0,207,255,.15);color:var(--a2); }
  .lb-u { background:rgba(255,107,53,.07);border:1px solid rgba(255,107,53,.15);color:var(--a3); }
  .lb-p { background:rgba(180,127,255,.07);border:1px solid rgba(180,127,255,.15);color:var(--purple); }
  .quick-chips { display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-top:2px; }
  .chip {
    background:var(--s2);border:1px solid var(--border2);
    border-radius:20px;padding:7px 13px;
    font-size:12px;font-weight:500;color:var(--text2);
    cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;
  }
  .chip:active { background:rgba(232,255,71,.08);border-color:rgba(232,255,71,.25);color:var(--a1);transform:scale(.95); }

  /* INSTALL BANNER */
  #install-banner {
    display: none; align-items: center; justify-content: space-between;
    padding: 10px 16px; gap: 10px;
    background: rgba(232,255,71,0.07); border-bottom: 1px solid rgba(232,255,71,0.15);
  }
  #install-banner.show { display: flex; }
  .install-text { font-size: 12px; color: var(--a1); font-weight: 500; }
  .install-btn {
    background: var(--a1); color: var(--bg); border: none;
    border-radius: 10px; padding: 7px 14px;
    font-family: 'Outfit', sans-serif; font-weight: 700;
    font-size: 12px; cursor: pointer; flex-shrink: 0;
  }
  .install-dismiss { color: var(--text3); font-size: 16px; cursor: pointer; padding: 4px; }

  /* PANELS */
  .panel {
    position:fixed;inset:0;z-index:50;
    display:none;flex-direction:column;
    background:rgba(7,9,14,.97);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    padding:24px 20px;
  }
  .panel.open { display:flex; }
  .panel-header { display:flex;align-items:center;justify-content:space-between;margin-bottom:6px; }
  .panel-header h3 { font-weight:800;font-size:20px; }
  .panel-close {
    width:34px;height:34px;border-radius:10px;
    background:var(--s2);border:1px solid var(--border);
    color:var(--text2);display:flex;align-items:center;
    justify-content:center;cursor:pointer;font-size:16px;
  }
  .panel-sub { font-size:12px;color:var(--text3);margin-bottom:16px;line-height:1.5; }

  /* MEMORY */
  #mem-list { flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:14px; }
  .mem-item {
    background:var(--s2);border:1px solid var(--border);border-radius:12px;
    padding:11px 14px;font-size:13px;color:var(--text2);line-height:1.5;
    display:flex;align-items:flex-start;gap:10px;cursor:pointer;
  }
  .mem-item::before { content:'◆';color:var(--a1);font-size:8px;margin-top:3px;flex-shrink:0;opacity:.6; }
  .mem-empty { text-align:center;color:var(--text3);font-size:13px;padding:40px 20px; }
  .mem-row { display:flex;gap:8px; }
  .mem-row input {
    flex:1;background:var(--s2);border:1px solid var(--border2);
    border-radius:12px;padding:12px 14px;color:var(--text);
    font-family:'Outfit',sans-serif;font-size:13px;outline:none;
  }
  .mem-row input:focus { border-color:rgba(232,255,71,.25); }
  .mem-add { background:var(--a1);color:var(--bg);border:none;border-radius:12px;padding:0 16px;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer; }

  /* ALERTS PANEL */
  #alerts-list { flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:14px; }
  .alert-item {
    background:var(--s2);border:1px solid var(--border);border-radius:12px;
    padding:12px 14px;font-size:13px;display:flex;align-items:center;gap:10px;
  }
  .alert-item .alert-icon { font-size:16px; }
  .alert-item .alert-text { flex:1;color:var(--text2);line-height:1.4; }
  .alert-item .alert-del { color:var(--text3);cursor:pointer;font-size:16px;padding:4px; }
  .alert-empty { text-align:center;color:var(--text3);font-size:13px;padding:30px 20px; }
  .alert-form { display:flex;flex-direction:column;gap:8px; }
  .alert-form select, .alert-form input {
    background:var(--s2);border:1px solid var(--border2);border-radius:12px;
    padding:11px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:13px;outline:none;
  }
  .alert-form select:focus, .alert-form input:focus { border-color:rgba(232,255,71,.25); }
  .alert-form select option { background:var(--s2); }
  .alert-add { background:var(--a1);color:var(--bg);border:none;border-radius:12px;padding:12px;font-family:'Outfit',sans-serif;font-weight:700;font-size:13px;cursor:pointer;width:100%; }

  /* SETTINGS */
  .settings-scroll { flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:13px;margin-bottom:13px; }
  .s-row { display:flex;flex-direction:column;gap:6px; }
  .s-row label { font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3); }
  .s-row input, .s-row select {
    background:var(--s2);border:1px solid var(--border2);border-radius:12px;
    padding:12px 14px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;outline:none;width:100%;
  }
  .s-row input:focus, .s-row select:focus { border-color:rgba(232,255,71,.25); }
  .s-row select option { background:var(--s2); }
  .s-hint { font-size:11px;color:var(--text3);line-height:1.5; }
  .s-hint a { color:var(--a2);text-decoration:none; }
  .s-section { font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:6px 0 2px;border-top:1px solid var(--border);margin-top:4px; }
  .save-btn { width:100%;padding:14px;background:var(--a1);color:var(--bg);border:none;border-radius:14px;font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;cursor:pointer; }
  .danger-btn { width:100%;padding:11px;background:transparent;border:1px solid rgba(255,107,53,.2);border-radius:14px;color:rgba(255,107,53,.7);font-family:'Outfit',sans-serif;font-size:13px;cursor:pointer;margin-top:6px; }

  /* VOICE BAR */
  #voice-bar { display:none;align-items:center;justify-content:center;gap:3px;padding:4px 0 6px; }
  #voice-bar.show { display:flex; }
  .vb { width:3px;background:var(--a1);border-radius:3px;animation:vwave .7s ease-in-out infinite; }
  .vb:nth-child(1){height:8px}
  .vb:nth-child(2){height:18px;animation-delay:.1s;background:var(--a2)}
  .vb:nth-child(3){height:26px;animation-delay:.15s}
  .vb:nth-child(4){height:18px;animation-delay:.1s;background:var(--a2)}
  .vb:nth-child(5){height:8px}
  .vb:nth-child(6){height:14px;animation-delay:.2s;background:var(--a3)}
  .vb:nth-child(7){height:22px;animation-delay:.25s}
  @keyframes vwave{0%,100%{transform:scaleY(.4);opacity:.5}50%{transform:scaleY(1);opacity:1}}

  /* INPUT */
  #input-area {
    flex-shrink:0;padding:6px 13px 16px;
    background:rgba(7,9,14,.93);
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
    border-top:1px solid var(--border);
  }
  .input-wrap {
    display:flex;align-items:flex-end;gap:8px;
    background:var(--s2);border:1px solid var(--border2);
    border-radius:22px;padding:8px 8px 8px 16px;
    transition:border-color .2s,box-shadow .2s;
  }
  .input-wrap:focus-within { border-color:rgba(232,255,71,.2);box-shadow:0 0 0 3px rgba(232,255,71,.04); }
  #user-input {
    flex:1;background:transparent;border:none;outline:none;color:var(--text);
    font-family:'Outfit',sans-serif;font-size:15px;font-weight:400;
    line-height:1.5;resize:none;min-height:24px;max-height:110px;padding:3px 0;
  }
  #user-input::placeholder { color:var(--text3); }
  .iBtn {
    width:38px;height:38px;border-radius:14px;border:none;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;transition:all .15s;-webkit-tap-highlight-color:transparent;
  }
  #mic-btn { background:var(--s3);border:1px solid var(--border2);color:var(--text2); }
  #mic-btn.listening { background:rgba(232,255,71,.1);border-color:rgba(232,255,71,.4);color:var(--a1);box-shadow:0 0 12px rgba(232,255,71,.15); }
  #mic-btn:active { transform:scale(.9); }
  #send-btn { background:var(--a1);color:var(--bg); }
  #send-btn:active { transform:scale(.9); }
  #send-btn:disabled { opacity:.2;cursor:not-allowed;transform:none; }
  .input-hint { text-align:center;font-size:10px;color:var(--text3);margin-top:7px;letter-spacing:.3px;font-family:'Fira Code',monospace; }

  /* API MODAL */
  #api-modal {
    position:fixed;inset:0;z-index:100;background:var(--bg);
    display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto;
  }
  .modal-inner { width:100%;max-width:380px;display:flex;flex-direction:column;gap:14px;padding:4px 0; }
  .modal-top { display:flex;align-items:center;gap:12px;margin-bottom:2px; }
  .modal-icon {
    width:44px;height:44px;border-radius:13px;
    background:linear-gradient(135deg,rgba(232,255,71,.15),rgba(0,207,255,.15));
    border:1px solid rgba(232,255,71,.2);
    display:flex;align-items:center;justify-content:center;font-size:22px;
  }
  .modal-title { font-weight:800;font-size:26px;letter-spacing:-.5px; }
  .modal-title span { color:var(--a1); }
  .modal-desc { font-size:13px;color:var(--text2);line-height:1.6; }
  .field { display:flex;flex-direction:column;gap:6px; }
  .field label { font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3); }
  .field input {
    background:var(--s2);border:1px solid var(--border2);border-radius:13px;
    padding:13px 15px;color:var(--text);font-family:'Fira Code',monospace;
    font-size:13px;outline:none;transition:border-color .2s;width:100%;
  }
  .field input:focus { border-color:rgba(232,255,71,.3); }
  .field input::placeholder { color:var(--text3); }
  .field-hint { font-size:11px;color:var(--text3); }
  .field-hint a { color:var(--a2);text-decoration:none; }
  .launch-btn { width:100%;padding:15px;background:var(--a1);border:none;border-radius:14px;color:var(--bg);font-family:'Outfit',sans-serif;font-weight:800;font-size:15px;cursor:pointer; }
  .launch-btn:active { transform:scale(.98); }
  .modal-note { font-size:11px;color:var(--text3);text-align:center; }

  /* TOAST */
  #toast {
    position:fixed;bottom:90px;left:50%;
    transform:translateX(-50%) translateY(16px);
    background:rgba(255,107,53,.12);border:1px solid rgba(255,107,53,.25);
    color:#ff8c5a;padding:10px 18px;border-radius:20px;
    font-size:12px;font-weight:500;opacity:0;transition:all .25s;
    pointer-events:none;z-index:200;max-width:90%;text-align:center;
  }
  #toast.show { opacity:1;transform:translateX(-50%) translateY(0); }
  #toast.ok { background:rgba(0,255,157,.1);border-color:rgba(0,255,157,.2);color:var(--green); }
</style>
</head>
